name: ONI Update Watchdog

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-oni-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check ONI Steam build
        id: oni
        shell: pwsh
        run: ./scripts/check-oni-update.ps1 -OutputPath oni-watch-result.json

      - name: Open compatibility issue
        if: steps.oni.outputs.update_detected == 'true'
        uses: actions/github-script@v7
        env:
          ISSUE_TITLE: ${{ steps.oni.outputs.issue_title }}
          ISSUE_BODY: ${{ steps.oni.outputs.issue_body }}
        with:
          script: |
            const title = process.env.ISSUE_TITLE;
            const body = process.env.ISSUE_BODY;
            const labels = ['oni-update', 'compatibility'];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label
                });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: label === 'oni-update' ? 'f9d0c4' : 'd4c5f9'
                });
              }
            }

            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'oni-update',
              per_page: 100
            });

            const alreadyOpen = existing.find(issue =>
              !issue.pull_request &&
              issue.title.includes(`${{ steps.oni.outputs.current_build_id }}`)
            );

            if (alreadyOpen) {
              core.info(`Compatibility issue already exists: #${alreadyOpen.number}`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels
            });
